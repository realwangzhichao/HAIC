# @package task
defaults:
  - base/hdmi-base
  - _self_

name: G1PushCartBox

viewer:
  env_spacing: 5.0
  lookat: [0.5, -2.5, 0.8]
  eye: [3, 2, 1.]

terrain: plane

robot:
  name: g1
  robot_type: g1_29dof_rubberhand-feet_box-eef_box-body_capsule

command:
  data_path: data/motion/g1/mirobotA/push_cart_box
  root_body_name: "pelvis"

  # reset_range: [0, 100]
  
  replay_motion: False

  object_asset_name: "mybox"
  object_body_name:  "mybox"

  contact_eef_body_name: ["left_wrist_yaw_link", "right_wrist_yaw_link"]
  contact_eef_pos_offset:
    - [0.05, 0.0, 0.0]  # left wrist
    - [0.05, 0.0, 0.0]  # right wrist
  contact_target_pos_offset:
    - [-0.05, 0.18, 0.03]  # left wrist
    - [-0.05,-0.18, 0.03]  # right wrist

  object2_asset_name: "cart"
  object2_body_name:  "board_deck"
  object2_joint_name: ["front_left_wheel_joint_0","front_right_wheel_joint_0","rear_left_wheel_joint_0","rear_right_wheel_joint_0", "front_left_wheel_joint_1","front_right_wheel_joint_1","rear_left_wheel_joint_1","rear_right_wheel_joint_1"]
  
  object2_pose_range:
    x: [-0.01, 0.01]
  
  contact2_eef_body_name: ["left_wrist_yaw_link", "right_wrist_yaw_link"]
  contact2_eef_pos_offset:
    - [0.0, 0.0, 0.0]  # left wrist
    - [0.0, 0.0, 0.0]  # right wrist
  contact2_target_pos_offset:
    - [0.46, -0.10, 0.65]  # left wrist
    - [0.46, 0.10, 0.65]  # right wrist

observation:
  priv:
    object2_joint_pos:    {}
    object2_joint_vel:    {}
    object2_joint_torque: {}
  object_:
    object2_xy_b:               {noise_std: 0.01, episodic_noise_std: 0.0}
    object2_heading_b:          {noise_std: 0.01, episodic_noise_std: 0.0}
    ref_contact2_pos_b:         {noise_std: 0.01, episodic_noise_std: 0.02, yaw_only: true}
    object_pos_b:    {}
    object_ori_b:    {}
    object2_pos_b:    {}
    object2_ori_b:    {}
  object_geo_:
    object_points:    {}
    object2_points:    {}

randomization:
  object_joint_randomization:
    armature2_range: [0.0, 0.01]

    friction2_range: [0.01, 0.1]
    damping2_range: [0.01, 0.1]

  object_body_randomization:
    static_dynamic_friction_ratio_range: [1.0, 2.0]
    dynamic_friction_range: [0.3, 0.8]
    restitution_range: [0.0, 0.2]
    mass_range: [1.0, 1.8]
    object2_static_dynamic_friction_ratio_range: [1.0, 2.0]
    object2_dynamic_friction_range: [0.3, 0.8]
    object2_restitution_range: [0.0, 0.2]
    object2_mass_range: [11.0, 13.0]
    object2_wheel_mass_range: [0.2, 0.4]
  
  body_scale:
    name: ["mybox", "cart"]
    scale_range: [[0.9, 1.1], [0.9, 1.1]]
    homogeneous_scale: [false, true]

  push_start:
    body_names: [".*_wrist_yaw_link"]
    force_range: [0.2, 0.5]
    push_start_idx: 500

termination:
  cum_object2_pos_error:    {min_steps: 5000}
  cum_object2_ori_error:    {min_steps: 5000}
  cum_lost_contact2_steps:   {min_steps: 25, pos_thres: 0.2, frc_thres: 1.0}

reward:
  # tracking:
  #   tracking_upper_body_pos(keypoint_pos_tracking_product):
  #     body_names: [".*_shoulder_pitch_link", ".*_elbow_link", ".*_wrist_yaw_link"]
  #     weight: 0.5
  #     sigma: 0.25
  #   tracking_lower_body_pos(keypoint_pos_tracking_product):
  #     body_names: [".*_hip_pitch_link", ".*_knee_link", ".*_ankle_roll_link"]
  #     weight: 0.5
  #     sigma: 0.5

  #   tracking_upper_body_ori(keypoint_ori_tracking_product):
  #     body_names: [".*_shoulder_pitch_link", ".*_elbow_link", ".*_wrist_yaw_link"]
  #     weight: 0.5
  #     sigma: 0.5
  #   tracking_lower_body_ori(keypoint_ori_tracking_product):
  #     body_names: [".*_hip_pitch_link", ".*_knee_link", ".*_ankle_roll_link"]
  #     weight: 0.5
  #     sigma: 1.0
  feet:
    feet_air_time:      {weight: 0.5, enabled: true, body_names: .*ankle_roll_link, thres: 0.3, soft_discount: 1.0}
    feet_air_lift:      {weight: 0.5, enabled: true, body_names: .*ankle_roll_link, low_thres: 0.10, high_thres: 0.18, sigma: 1.0}
    feet_contact:       {weight: 0.5, enabled: true, body_names: .*ankle_roll_link, sigma: 0.25}