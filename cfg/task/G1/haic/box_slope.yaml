# @package task
defaults:
  - base/hdmi-base
  - _self_

name: G1BoxSlope

viewer:
  env_spacing: 5.0
  lookat: [0.5, -2.5, 0.8]
  eye: [3, 2, 1.]

terrain: plane

robot:
  name: g1
  robot_type: g1_29dof_rubberhand-feet_box-eef_box-body_capsule

command:
  # data_path: data/motion/g1/mybox/box_1
  data_path: data/motion/g1/mirobotA/box_slope
  root_body_name: "pelvis"

  replay_motion: False

  reset_range: [0, 100]

  object_asset_name: "mybox"
  object_body_name:  "mybox"

  contact_eef_pos_offset:
    - [0.05, 0.0, 0.0]  # left wrist
    - [0.05, 0.0, 0.0]  # right wrist
  contact_target_pos_offset:
    - [-0.05, 0.18, 0.03]  # left wrist
    - [-0.05,-0.18, 0.03]  # right wrist

  extra_object_names: ["stairslope"]
  
observation:
  object_:
    object_pos_b:    {}
    object_ori_b:    {}
    extra_object_pos_b:    {}
    extra_object_ori_b:    {}
  object_geo_:
    object_points:    {}
    extra_object_points:    {}

randomization:
  object_body_randomization:
    static_dynamic_friction_ratio_range: [1.0, 2.0]
    dynamic_friction_range: [0.3, 0.8]
    restitution_range: [0.0, 0.2]
    mass_range: [1.0, 1.8]
  
  body_scale:
    name: ["mybox", "stairslope"]
    scale_range: [[0.9, 1.1], [0.98, 1.02]]

reward:
  # tracking:
  #   tracking_upper_body_pos(keypoint_pos_tracking_product):
  #     body_names: [".*_shoulder_pitch_link", ".*_elbow_link", ".*_wrist_yaw_link"]
  #     weight: 0.5
  #     sigma: 0.5
  #   tracking_lower_body_pos(keypoint_pos_tracking_product):
  #     body_names: [".*_hip_pitch_link", ".*_knee_link", ".*_ankle_roll_link"]
  #     weight: 0.5
  #     sigma: 1.0

  #   tracking_upper_body_ori(keypoint_ori_tracking_product):
  #     body_names: [".*_shoulder_pitch_link", ".*_elbow_link", ".*_wrist_yaw_link"]
  #     weight: 0.5
  #     sigma: 0.5
  #   tracking_lower_body_ori(keypoint_ori_tracking_product):
  #     body_names: [".*_hip_pitch_link", ".*_knee_link", ".*_ankle_roll_link"]
  #     weight: 0.5
  #     sigma: 1.0
  feet:
    feet_air_time:      {weight: 1.0, enabled: true, body_names: .*ankle_roll_link, thres: 0.3, soft_discount: 1.0}
    feet_air_lift:      {weight: 1.0, enabled: true, body_names: .*ankle_roll_link, low_thres: 0.12, high_thres: 0.15, sigma: 0.25}
    feet_contact:       {weight: 1.0, enabled: true, body_names: .*ankle_roll_link, sigma: 0.25}
  loco:
    joint_pos_limits:   {weight: 15.0, joint_names: ".*", soft_factor: 0.8, enabled: true}
    waist_pos_limits:   {weight: 15.0, enabled: true}